site_name: prompt-armor
site_description: Open-core LLM prompt security analysis
site_url: https://prompt-armor.dev
repo_url: https://github.com/prompt-armor/prompt-armor
repo_name: prompt-armor/prompt-armor

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
  features:
    - content.code.copy
    - navigation.sections

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Configuration: configuration.md
  - Analysis Layers: layers.md
  - CLI Reference: cli.md
  - MCP Server: mcp.md
  - Benchmark: benchmark.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - tables
